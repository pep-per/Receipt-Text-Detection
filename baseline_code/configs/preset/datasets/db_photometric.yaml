# @package _global_

defaults:
  - db
  - _self_

transforms:
  train_transform:
    _target_: ${dataset_path}.DBTransforms
    transforms:
      - _target_: albumentations.LongestMaxSize
        max_size: 640
        p: 1.0
      - _target_: albumentations.PadIfNeeded
        min_width: 640
        min_height: 640
        border_mode: 0
        p: 1.0
      - _target_: albumentations.HorizontalFlip
        p: 0.5
      - _target_: albumentations.OneOf
        transforms:
          - _target_: albumentations.RandomBrightnessContrast
            brightness_limit: 0.15
            contrast_limit: 0.15
            p: 0.30
          - _target_: albumentations.RandomGamma
            gamma_limit: [85, 115]
            p: 0.20
          - _target_: albumentations.GaussianBlur
            blur_limit: [3, 5]
            sigma_limit: [0.1, 1.0]
            p: 0.15
          - _target_: albumentations.MotionBlur
            blur_limit: [3, 5]
            p: 0.10
          - _target_: albumentations.ImageCompression
            quality_lower: 65
            quality_upper: 95
            p: 0.25
        p: 0.5
      - _target_: albumentations.Normalize
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]
    keypoint_params:
      _target_: albumentations.KeypointParams
      format: xy
      remove_invisible: true

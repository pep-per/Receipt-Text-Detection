hydra:
  run:
    dir: outputs/${exp_name}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    root:
      level: ERROR
    disable_existing_loggers: true
  job_logging:
    version: 1
    root:
      level: ERROR
    disable_existing_loggers: true
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - preset=example
    - dataset_base_path=/data/ephemeral/home/receipt-text-detection/data/datasets/
    - exp_name=v2b_resolution1024
    - project_name=receipt-text-detection
    - wandb=True
    - exp_version=v2b
    - trainer.max_epochs=10
    - trainer.num_sanity_val_steps=0
    - +trainer.accelerator=gpu
    - +trainer.devices=1
    - models.head.postprocess.box_thresh=0.25
    - transforms.train_transform.transforms.0.max_size=1024
    - transforms.train_transform.transforms.1.min_width=1024
    - transforms.train_transform.transforms.1.min_height=1024
    - transforms.val_transform.transforms.0.max_size=1024
    - transforms.val_transform.transforms.1.min_width=1024
    - transforms.val_transform.transforms.1.min_height=1024
    - transforms.test_transform.transforms.0.max_size=1024
    - transforms.test_transform.transforms.1.min_width=1024
    - transforms.test_transform.transforms.1.min_height=1024
    - transforms.predict_transform.transforms.0.max_size=1024
    - transforms.predict_transform.transforms.1.min_width=1024
    - transforms.predict_transform.transforms.1.min_height=1024
  job:
    name: train
    chdir: null
    override_dirname: +trainer.accelerator=gpu,+trainer.devices=1,dataset_base_path=/data/ephemeral/home/receipt-text-detection/data/datasets/,exp_name=v2b_resolution1024,exp_version=v2b,models.head.postprocess.box_thresh=0.25,preset=example,project_name=receipt-text-detection,trainer.max_epochs=10,trainer.num_sanity_val_steps=0,transforms.predict_transform.transforms.0.max_size=1024,transforms.predict_transform.transforms.1.min_height=1024,transforms.predict_transform.transforms.1.min_width=1024,transforms.test_transform.transforms.0.max_size=1024,transforms.test_transform.transforms.1.min_height=1024,transforms.test_transform.transforms.1.min_width=1024,transforms.train_transform.transforms.0.max_size=1024,transforms.train_transform.transforms.1.min_height=1024,transforms.train_transform.transforms.1.min_width=1024,transforms.val_transform.transforms.0.max_size=1024,transforms.val_transform.transforms.1.min_height=1024,transforms.val_transform.transforms.1.min_width=1024,wandb=True
    id: ???
    num: ???
    config_name: train
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.2'
    cwd: /data/ephemeral/home/receipt-text-detection/baseline_code
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /data/ephemeral/home/receipt-text-detection/baseline_code/configs
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /data/ephemeral/home/receipt-text-detection/baseline_code/outputs/v2b_resolution1024
    choices:
      preset: example
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: disabled
      hydra/hydra_logging: disabled
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
